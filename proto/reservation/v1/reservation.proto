syntax = "proto3";

package reservation.v1;

option go_package = "parkir-pintar/services/reservation/gen/reservation/v1;reservationv1";

import "google/protobuf/timestamp.proto";

// ─── Enums ───────────────────────────────────────────────────────────────────

enum VehicleType {
  VEHICLE_TYPE_UNSPECIFIED = 0;
  VEHICLE_TYPE_CAR         = 1;
  VEHICLE_TYPE_MOTORCYCLE  = 2;
}

enum AssignmentMode {
  ASSIGNMENT_MODE_UNSPECIFIED    = 0;
  ASSIGNMENT_MODE_SYSTEM_ASSIGNED = 1;
  ASSIGNMENT_MODE_USER_SELECTED   = 2;
}

enum ReservationStatus {
  RESERVATION_STATUS_UNSPECIFIED      = 0;
  RESERVATION_STATUS_PENDING_PAYMENT  = 1;
  RESERVATION_STATUS_CONFIRMED        = 2;
  RESERVATION_STATUS_EXPIRED          = 3;
  RESERVATION_STATUS_CHECKED_IN       = 4;
  RESERVATION_STATUS_COMPLETED        = 5;
  RESERVATION_STATUS_CANCELLED        = 6;
}

// ─── Service ─────────────────────────────────────────────────────────────────

service ReservationService {
  rpc CreateReservation (CreateReservationRequest) returns (CreateReservationResponse);
  rpc GetReservation    (GetReservationRequest)    returns (GetReservationResponse);
}

// ─── CreateReservation ───────────────────────────────────────────────────────

message CreateReservationRequest {
  string         idempotency_key = 1; // client-generated UUID
  string         driver_id       = 2; // UUID
  VehicleType    vehicle_type    = 3;
  AssignmentMode mode            = 4;
  string         spot_id         = 5; // UUID — required only for USER_SELECTED
}

message CreateReservationResponse {
  string            reservation_id = 1; // UUID
  string            spot_id        = 2; // UUID
  string            spot_code      = 3; // e.g. "A3"
  int32             floor_number   = 4;
  ReservationStatus status         = 5; // PENDING_PAYMENT
  string            qr_code_url    = 6; // QRIS code URL for booking fee payment
}

// ─── GetReservation ──────────────────────────────────────────────────────────

message GetReservationRequest {
  string reservation_id = 1; // UUID
}

message GetReservationResponse {
  string                    reservation_id  = 1;
  string                    driver_id       = 2;
  string                    spot_id         = 3;
  string                    spot_code       = 4;
  int32                     floor_number    = 5;
  VehicleType               vehicle_type    = 6;
  AssignmentMode            assignment_mode = 7;
  ReservationStatus         status          = 8;
  google.protobuf.Timestamp confirmed_at    = 9;
  google.protobuf.Timestamp expires_at      = 10;
  google.protobuf.Timestamp created_at      = 11;
}
